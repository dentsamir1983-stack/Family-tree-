<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>شجرة العيلة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0e0b08;color:#f0e8d8;font-family:'Tajawal',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;direction:rtl}
  :root{--accent:#d4a94a;--border:rgba(212,169,74,0.18);--card:rgba(255,255,255,0.05)}
  input,select,textarea{font-family:'Tajawal',sans-serif;font-size:15px;direction:rtl;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:#f0e8d8;padding:11px 14px;width:100%;outline:none;-webkit-appearance:none}
  button{font-family:'Tajawal',sans-serif;cursor:pointer;border:none}

  /* Top bar */
  #topbar{position:sticky;top:0;z-index:100;background:rgba(14,11,8,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between}
  #topbar h1{font-size:18px;font-weight:800}
  #topbar .sub{color:#5a4a38;font-size:12px;margin-top:2px}
  .top-actions{display:flex;gap:8px}
  .icon-btn{padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:#a89880;font-size:15px}
  .add-btn{background:rgba(46,125,50,0.3);border:1px solid rgba(46,125,50,0.5);color:#7ec87e}

  /* Bottom nav */
  #bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,8,5,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;color:#4a3a28;font-size:11px}
  .nav-btn.active{color:var(--accent)}
  .nav-btn .icon{font-size:22px}
  .nav-dot{width:20px;height:2px;border-radius:1px;background:var(--accent);margin-top:1px}

  /* Content */
  #content{padding-bottom:90px}

  /* Sync indicator */
  #sync-bar{background:rgba(46,125,50,0.15);border-bottom:1px solid rgba(46,125,50,0.2);padding:6px 16px;font-size:12px;color:#7ec87e;display:none;align-items:center;gap:6px}
  #sync-bar.show{display:flex}

  /* Tree */
  #tree-view{overflow-x:auto;padding:12px 0 24px;-webkit-overflow-scrolling:touch}
  .tree-inner{display:inline-flex;flex-direction:column;align-items:center;min-width:100%;padding-bottom:8px}
  .gen-row{display:flex;flex-direction:column;align-items:center}
  .gen-line{width:2px;height:28px;background:linear-gradient(to bottom,rgba(212,169,74,0.5),rgba(212,169,74,0.15))}
  .gen-members{display:flex;gap:10px;flex-wrap:nowrap;padding:0 12px}
  .h-line{width:20px;height:1.5px;background:rgba(212,169,74,0.3);align-self:flex-start;margin-top:28px}

  .tree-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 8px;border-radius:16px;background:var(--card);border:1px solid var(--border);min-width:82px;max-width:94px;transition:all .15s}
  .tree-card.dead{background:rgba(80,60,30,0.18);border-color:rgba(139,105,20,0.3)}
  .card-inner{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
  .card-name{font-weight:700;color:#f0e8d8;font-size:11px;line-height:1.3;word-break:break-word;text-align:center}
  .card-name.dead{color:#a89060}
  .card-rel{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;margin-top:2px}
  .card-rel.male{background:rgba(46,125,210,0.25);color:#7ec8f7}
  .card-rel.female{background:rgba(194,85,154,0.25);color:#f0a0d5}
  .death-btn{margin-top:2px;padding:3px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#4a3a28;font-size:9px;width:100%}
  .death-btn.is-dead{border-color:rgba(139,105,20,0.4);background:rgba(139,105,20,0.15);color:#c8a040}

  /* Avatar */
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-weight:800;color:#fff;position:relative}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar.male{background:linear-gradient(145deg,#1e4d8c,#2d7dd2);border:2.5px solid #4fa3e8}
  .avatar.female{background:linear-gradient(145deg,#7b2869,#c2559a);border:2.5px solid #e48fca}
  .dead-badge{position:absolute;bottom:-2px;right:-2px;background:#3a2010;border:1.5px solid #8b6914;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px}

  /* Age labels */
  .age-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:3px}
  .age-year{color:#7a6a52;font-size:10px}
  .age-badge{font-size:9px;border-radius:6px;padding:1px 5px}
  .age-badge.alive{color:#3a7a3a;background:rgba(58,122,58,0.18)}
  .age-badge.dead{color:#8b6914;background:rgba(139,105,20,0.18)}

  /* List */
  #list-view{padding:0 0 80px}
  .search-wrap{padding:12px 16px;position:relative}
  .search-wrap input{padding-right:40px}
  .search-icon{position:absolute;right:30px;top:50%;transform:translateY(-50%);opacity:.5}
  .list-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background .15s}
  .list-row:active{background:rgba(212,169,74,0.07)}
  .list-info{flex:1;min-width:0;cursor:pointer}
  .list-name{font-weight:700;font-size:15px}
  .list-name.dead{color:#a89060}
  .list-sub{color:#6a5a42;font-size:12px;margin-top:1px}
  .list-death-btn{padding:5px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#4a3a28;font-size:11px;flex-shrink:0}
  .list-death-btn.is-dead{border-color:rgba(139,105,20,0.4);background:rgba(139,105,20,0.15);color:#c8a040}

  /* Gallery */
  #gallery-view{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 0 80px}
  .gallery-item{position:relative;aspect-ratio:1;overflow:hidden}
  .gallery-item img{width:100%;height:100%;object-fit:cover}
  .gallery-label{position:absolute;bottom:0;left:0;right:0;padding:16px 6px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.75));text-align:center;font-size:11px;font-weight:700}
  .no-photos{text-align:center;padding:60px 24px;color:#4a3a28}
  .no-photos .icon{font-size:48px;margin-bottom:12px}

  /* Bottom Sheet */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);z-index:200;display:none}
  .sheet-overlay.show{display:block}
  .sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(170deg,#1a1208,#0e0b06);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:0 0 32px;max-height:90vh;overflow-y:auto;z-index:201;direction:rtl;transition:transform .3s}
  .sheet-handle{display:flex;justify-content:center;padding:12px 0 4px}
  .sheet-handle-bar{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12)}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px;border-bottom:1px solid var(--border)}
  .sheet-title{font-weight:800;font-size:18px}
  .sheet-close{background:rgba(255,255,255,0.08);border:none;border-radius:20px;color:#a89880;padding:4px 12px;font-size:13px}
  .sheet-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;color:#8a7a62;font-size:13px;margin-bottom:6px}
  .field-row{display:flex;gap:10px}
  .field-row .field{flex:1}
  .gender-btns{display:flex;gap:8px}
  .gender-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#f0e8d8;font-size:14px}
  .gender-btn.male.active{border-color:#2d7dd2;background:rgba(46,125,210,0.2)}
  .gender-btn.female.active{border-color:#c2559a;background:rgba(194,85,154,0.2)}
  textarea{height:72px;resize:vertical}
  select[multiple]{height:72px}
  .save-btn{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;font-weight:800;font-size:16px;box-shadow:0 4px 16px rgba(46,125,50,0.3)}
  .action-btns{display:flex;gap:10px}
  .action-btn{flex:1;padding:10px 20px;border-radius:10px;color:#fff;font-weight:700;font-size:14px}

  /* Profile */
  .profile-header{display:flex;align-items:center;gap:14px;padding:12px 20px 20px;border-bottom:1px solid var(--border)}
  .profile-name{font-weight:800;font-size:20px}
  .profile-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
  .info-label{color:var(--accent);font-size:12px;font-weight:700;margin-bottom:8px;letter-spacing:.5px}
  .info-tags{display:flex;gap:8px;flex-wrap:wrap}
  .info-tag{color:#c8b89a;background:rgba(255,255,255,0.07);border-radius:8px;padding:5px 12px;font-size:13px}
  .bio-box{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.8;color:#c8b89a}

  /* Death popup */
  .death-popup-body{padding:16px 20px 0}
  .death-title{font-weight:700;font-size:16px;margin-bottom:4px}
  .death-sub{color:#6a5a42;font-size:13px;margin-bottom:16px}
  .death-row{display:flex;gap:10px}
  .death-save-btn{padding:11px 18px;border-radius:12px;background:linear-gradient(135deg,#5a2a2a,#8b2020);color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
  .cancel-death-btn{margin-top:10px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:#6a5a42;font-size:13px}

  /* Loading */
  #loading{position:fixed;inset:0;background:#0e0b08;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
  #loading .spinner{width:40px;height:40px;border:3px solid rgba(212,169,74,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{color:#5a4a38;font-size:14px}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:36px">🌳</div>
  <div class="spinner"></div>
  <p>جاري التحميل...</p>
</div>

<div id="topbar" style="display:none">
  <div>
    <div id="h1">🌳 شجرة العيلة</div>
    <div class="sub" id="member-count">0 فرد</div>
  </div>
  <div class="top-actions">
    <button class="icon-btn add-btn" onclick="openAdd()">＋</button>
  </div>
</div>

<div id="sync-bar">
  <span>🟢</span><span id="sync-text">متصل — التغييرات تظهر فوراً للجميع</span>
</div>

<div id="content" style="display:none">
  <div id="tree-view"></div>
  <div id="list-view" style="display:none"></div>
  <div id="gallery-view" style="display:none"></div>
</div>

<div id="bottom-nav" style="display:none">
  <button class="nav-btn active" onclick="switchTab('tree',this)">
    <span class="icon">🌳</span><span>الشجرة</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="switchTab('list',this)">
    <span class="icon">👥</span><span>الأفراد</span>
  </button>
  <button class="nav-btn" onclick="switchTab('gallery',this)">
    <span class="icon">🖼️</span><span>الصور</span>
  </button>
</div>

<!-- Profile Sheet -->
<div class="sheet-overlay" id="profile-overlay" onclick="closeProfile()"></div>
<div class="sheet" id="profile-sheet"></div>

<!-- Edit Sheet -->
<div class="sheet-overlay" id="edit-overlay" onclick="closeEdit()"></div>
<div class="sheet" id="edit-sheet"></div>

<!-- Death Popup -->
<div class="sheet-overlay" id="death-overlay" onclick="closeDeath()"></div>
<div class="sheet" id="death-sheet"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLhvqsUe2Fkscw8dqJ3tevaRIDms_D9tI",
  authDomain: "family-tree-a2da7.firebaseapp.com",
  projectId: "family-tree-a2da7",
  storageBucket: "family-tree-a2da7.firebasestorage.app",
  messagingSenderId: "59565031581",
  appId: "1:59565031581:web:485d8840c7196001ba9474",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let members = [];
let currentTab = 'tree';
let searchVal = '';

// Auto-start app
document.getElementById('loading').style.display = 'flex';
initApp();

function initApp() {
  onSnapshot(collection(db, "members"), (snap) => {
  members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  document.getElementById('loading').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('content').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('sync-bar').classList.add('show');
  document.getElementById('member-count').textContent = members.length + ' فرد';
  render();
  }, (err) => {
  document.getElementById('loading').innerHTML = '<div style="font-size:36px">⚠️</div><p style="color:#c87a7a;text-align:center;padding:0 24px">خطأ في الاتصال بقاعدة البيانات.<br>تأكد من إعدادات Firebase.</p>';
  });
}

async function saveMember(m) {
  await setDoc(doc(db, "members", String(m.id)), m);
}

async function removeMember(id) {
  await deleteDoc(doc(db, "members", String(id)));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcAge(birth, death) {
  if (!birth) return null;
  const b = parseInt(birth), d = death ? parseInt(death) : new Date().getFullYear();
  return isNaN(b)||isNaN(d) ? null : d - b;
}

function ageHtml(m) {
  if (!m.birth) return '';
  const isDead = !!m.death;
  const age = calcAge(m.birth, m.death);
  let html = `<span class="age-year">${m.birth}</span>`;
  if (isDead && m.death) html += `<span class="age-year">— ${m.death}</span>`;
  if (age !== null) html += `<span class="age-badge ${isDead?'dead':'alive'}">
    ${isDead?'🕊️ ':''}${age} سنة</span>`;
  return `<div class="age-row">${html}</div>`;
}

function avatarHtml(m, size) {
  const letter = m.name ? m.name.charAt(0) : '?';
  const img = m.photo ? `<img src="${m.photo}" alt="${m.name}">` : `<span style="font-size:${size*.4}px">${letter}</span>`;
  const badge = m.death ? `<div class="dead-badge">🕊️</div>` : '';
  return `<div class="avatar ${m.gender||'male'}" style="width:${size}px;height:${size}px;font-size:${size*.4}px">${img}${badge}</div>`;
}

function getGens() {
  const g1 = members.filter(m => !m.parentIds?.some(pid => members.find(x=>x.id==pid))).map(m=>m.id);
  const g2 = members.filter(m => m.parentIds?.some(pid=>g1.includes(pid))).map(m=>m.id);
  const g3 = members.filter(m => m.parentIds?.some(pid=>g2.includes(pid))).map(m=>m.id);
  const g4 = members.filter(m => m.parentIds?.some(pid=>g3.includes(pid))).map(m=>m.id);
  return [g1,g2,g3,g4].filter(g=>g.length>0);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (currentTab==='tree') renderTree();
  else if (currentTab==='list') renderList();
  else renderGallery();
}

function treeCardHtml(m) {
  if (!m) return '';
  const isDead = !!m.death;
  return `<div class="tree-card${isDead?' dead':''}">
    <div class="card-inner" onclick="openProfile('${m.id}')">
      ${avatarHtml(m, 52)}
      <div>
        <div class="card-name${isDead?' dead':''}">${m.name||''}</div>
        <div class="card-rel ${m.gender||'male'}">${m.relation||''}</div>
        ${ageHtml(m)}
      </div>
    </div>
    <button class="death-btn${isDead?' is-dead':''}" onclick="openDeath('${m.id}')">${isDead?'🕊️ متوفي':'＋ وفاة'}</button>
  </div>`;
}

function getSpouse(m) {
  if (!m.spouseId) return null;
  return members.find(x => String(x.id) === String(m.spouseId)) || null;
}

function getChildrenOf(m) {
  const spouse = getSpouse(m);
  return members.filter(c => {
    if (!c.parentIds || c.parentIds.length === 0) return false;
    const pids = c.parentIds.map(String);
    return pids.includes(String(m.id)) || (spouse && pids.includes(String(spouse.id)));
  }).filter((c,i,arr) => arr.findIndex(x=>x.id===c.id)===i);
}

function isSpouseOf(m, other) {
  return String(other.spouseId) === String(m.id) || String(m.spouseId) === String(other.id);
}

function hasParentsInTree(m) {
  if (!m.parentIds || m.parentIds.length === 0) return false;
  return m.parentIds.some(pid => members.find(x => String(x.id) === String(pid)));
}

// ── Expandable Tree ───────────────────────────────────────────────────────────
let expandedIds = new Set();

function treeCardHtml(m) {
  if (!m) return '';
  const isDead = !!m.death;
  const children = getChildrenOf(m);
  const spouse = getSpouse(m);
  const hasFamily = children.length > 0 || spouse;
  const isExpanded = expandedIds.has(String(m.id));

  return `<div class="tree-card${isDead?' dead':''}" style="position:relative">
    <div class="card-inner" onclick="toggleExpand('${m.id}')">
      <div style="position:relative">
        ${avatarHtml(m, 52)}
        ${hasFamily && !isExpanded ? `<div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:var(--accent);border-radius:10px;padding:0 5px;font-size:9px;color:#000;white-space:nowrap">${children.length > 0 ? children.length+'👨‍👩‍👧' : '💑'}</div>` : ''}
      </div>
      <div>
        <div class="card-name${isDead?' dead':''}">${m.name||''}</div>
        <div class="card-rel ${m.gender||'male'}">${m.relation||''}</div>
        ${ageHtml(m)}
      </div>
    </div>
    <button class="death-btn${isDead?' is-dead':''}" onclick="openDeath('${m.id}')">${isDead?'🕊️ متوفي':'＋ وفاة'}</button>
  </div>`;
}

window.toggleExpand = (id) => {
  if (expandedIds.has(String(id))) {
    // Collapse this and all descendants
    collapseDescendants(String(id));
  } else {
    expandedIds.add(String(id));
    // Also expand spouse
    const m = members.find(x => String(x.id) === String(id));
    if (m?.spouseId) expandedIds.add(String(m.spouseId));
  }
  renderTree();
};

function collapseDescendants(id) {
  expandedIds.delete(id);
  const m = members.find(x => String(x.id) === id);
  if (!m) return;
  if (m.spouseId) expandedIds.delete(String(m.spouseId));
  getChildrenOf(m).forEach(c => collapseDescendants(String(c.id)));
}

function renderExpandableNode(m, rendered) {
  if (rendered.has(String(m.id))) return '';
  rendered.add(String(m.id));

  const spouse = getSpouse(m);
  if (spouse) rendered.add(String(spouse.id));

  const isExpanded = expandedIds.has(String(m.id));
  const children = getChildrenOf(m);

  let html = `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:top">`;

  // Couple row
  html += `<div style="display:flex;align-items:flex-start;justify-content:center;gap:4px">`;
  html += treeCardHtml(m);
  if (isExpanded && spouse) {
    html += `<div style="display:flex;align-items:center;margin-top:26px">
      <div style="width:10px;height:2px;background:rgba(212,169,74,0.5)"></div>
      <span style="font-size:11px">💑</span>
      <div style="width:10px;height:2px;background:rgba(212,169,74,0.5)"></div>
    </div>`;
    html += treeCardHtml(spouse);
  }
  html += `</div>`;

  // Children (only if expanded)
  if (isExpanded && children.length > 0) {
    html += `<div style="width:2px;height:16px;background:rgba(212,169,74,0.4)"></div>`;
    html += `<div style="display:flex;gap:6px;align-items:flex-start;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:0 4px">`;
    children.forEach(child => {
      html += renderExpandableNode(child, rendered);
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderTree() {
  if (members.length === 0) {
    document.getElementById('tree-view').innerHTML = `
      <div style="text-align:center;padding:60px 24px;color:#4a3a28;font-family:'Tajawal',sans-serif">
        <div style="font-size:48px;margin-bottom:12px">🌳</div>
        <div>اضغط ＋ لإضافة أول فرد في العيلة</div>
      </div>`;
    return;
  }

  const rendered = new Set();
  const roots = members.filter(m => !hasParentsInTree(m));
  const rootSpouseIds = new Set();
  roots.forEach(m => {
    if (m.spouseId) {
      const sp = members.find(x => String(x.id) === String(m.spouseId));
      if (sp && !hasParentsInTree(sp)) rootSpouseIds.add(String(sp.id));
    }
  });
  const mainRoots = roots.filter(m => !rootSpouseIds.has(String(m.id)));

  let html = `<div style="overflow-x:auto;padding:16px 8px 24px;-webkit-overflow-scrolling:touch">
    <div style="font-family:'Tajawal',sans-serif;color:#5a4a38;font-size:12px;text-align:center;margin-bottom:12px">اضغط على أي شخص لعرض عيلته 👇</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;min-width:max-content;margin:0 auto">`;

  mainRoots.forEach(root => {
    html += renderExpandableNode(root, rendered);
  });

  members.forEach(m => {
    if (!rendered.has(String(m.id))) {
      html += renderExpandableNode(m, rendered);
    }
  });

  html += `</div></div>`;
  document.getElementById('tree-view').innerHTML = html;
}

function renderList() {
  const filtered = members.filter(m=>
    m.name?.includes(searchVal)||m.relation?.includes(searchVal));
  let html = `<div class="search-wrap">
    <input type="text" placeholder="ابحث عن فرد..." value="${searchVal}" oninput="setSearch(this.value)">
    <span class="search-icon">🔍</span>
  </div>`;
  filtered.forEach(m => {
    const isDead = !!m.death;
    html += `<div class="list-row">
      <div onclick="openProfile('${m.id}')" style="position:relative;flex-shrink:0">${avatarHtml(m,48)}</div>
      <div class="list-info" onclick="openProfile('${m.id}')">
        <div class="list-name${isDead?' dead':''}">${m.name||''}</div>
        <div class="list-sub">${m.relation||''}${m.birth?` · ${m.birth}`:''}${isDead&&m.death?` — ${m.death}`:''}</div>
        ${ageHtml(m)}
      </div>
      <button class="list-death-btn${isDead?' is-dead':''}" onclick="openDeath('${m.id}')">
        ${isDead?'🕊️':'＋'}
      </button>
    </div>`;
  });
  document.getElementById('list-view').innerHTML = html;
}

function renderGallery() {
  const photos = members.filter(m=>m.photo);
  if (!photos.length) {
    document.getElementById('gallery-view').innerHTML = `<div class="no-photos" style="grid-column:1/-1">
      <div class="icon">🖼️</div><div>لا توجد صور بعد</div></div>`;
    return;
  }
  document.getElementById('gallery-view').innerHTML = photos.map(m=>`
    <div class="gallery-item">
      <img src="${m.photo}" alt="${m.name}">
      <div class="gallery-label">${m.name||''}</div>
    </div>`).join('');
}

// ── Tab switch ────────────────────────────────────────────────────────────────
window.switchTab = (tab, btn) => {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.querySelector('.nav-dot')?.remove();
  });
  btn.classList.add('active');
  if (!btn.querySelector('.nav-dot')) {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    btn.appendChild(dot);
  }
  ['tree-view','list-view','gallery-view'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById(tab+'-view').style.display = tab==='gallery'?'grid':'block';
  render();
};

window.setSearch = (v) => { searchVal = v; renderList(); };

// ── Profile ───────────────────────────────────────────────────────────────────
window.openProfile = (id) => {
  const m = members.find(x=>x.id==id); if(!m) return;
  const spouse = m.spouseId ? members.find(x=>x.id==m.spouseId) : null;
  const children = members.filter(x=>x.parentIds?.includes(id));
  const parents = (m.parentIds||[]).map(pid=>members.find(x=>x.id==pid)).filter(Boolean);
  const isDead = !!m.death;
  const age = calcAge(m.birth, m.death);

  let html = `<div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
  <div class="profile-header">
    ${avatarHtml(m,70)}
    <div style="flex:1">
      <div class="profile-name">${m.name||''}</div>
      <div class="card-rel ${m.gender||'male'}" style="margin-top:4px">${m.relation||''}</div>
      <div style="color:#6a5a42;font-size:13px;margin-top:3px">${m.birth||''}${isDead&&m.death?` — ${m.death}`:''}</div>
      ${age!==null?`<div style="margin-top:4px">${ageHtml(m)}</div>`:''}
    </div>
  </div>
  <div class="profile-body">`;

  if(m.bio) html += `<div class="bio-box">${m.bio}</div>`;
  if(parents.length) html += `<div><div class="info-label">الوالدان</div><div class="info-tags">${parents.map(p=>`<span class="info-tag">${p.name}</span>`).join('')}</div></div>`;
  if(spouse) html += `<div><div class="info-label">الزوج / الزوجة</div><div class="info-tags"><span class="info-tag">${spouse.name}</span></div></div>`;
  if(children.length) html += `<div><div class="info-label">الأبناء</div><div class="info-tags">${children.map(c=>`<span class="info-tag">${c.name}</span>`).join('')}</div></div>`;

  html += `<div class="action-btns">
    <button class="action-btn" style="background:#1e4a8c" onclick="closeProfile();openEdit('${m.id}')">✏️ تعديل</button>
    <button class="action-btn" style="background:#7a1a1a" onclick="deleteMember('${m.id}')">🗑️ حذف</button>
  </div></div>`;

  document.getElementById('profile-sheet').innerHTML = html;
  document.getElementById('profile-overlay').classList.add('show');
  document.getElementById('profile-sheet').style.display = 'block';
};

window.closeProfile = () => {
  document.getElementById('profile-overlay').classList.remove('show');
  document.getElementById('profile-sheet').style.display = 'none';
};

// ── Death popup ───────────────────────────────────────────────────────────────
window.openDeath = (id) => {
  const m = members.find(x=>x.id==id); if(!m) return;
  const isDead = !!m.death;
  const previewAge = m.birth ? `· <span id="death-preview" style="color:var(--accent)"></span>` : '';

  document.getElementById('death-sheet').innerHTML = `
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="death-popup-body">
      <div class="death-title">🕊️ تسجيل وفاة ${m.name}</div>
      <div class="death-sub">المولود سنة ${m.birth||'؟'} ${previewAge}</div>
      <div class="death-row">
        <input type="number" id="death-year" placeholder="سنة الوفاة" value="${m.death||''}"
          oninput="previewDeathAge('${m.birth}',this.value)" style="flex:1">
        <button class="death-save-btn" onclick="saveDeath('${id}')">حفظ</button>
      </div>
      ${isDead?`<button class="cancel-death-btn" onclick="saveDeath('${id}',true)">إلغاء تسجيل الوفاة</button>`:''}
      <div style="height:16px"></div>
    </div>`;

  document.getElementById('death-overlay').classList.add('show');
  document.getElementById('death-sheet').style.display = 'block';
  setTimeout(()=>document.getElementById('death-year')?.focus(),100);
};

window.previewDeathAge = (birth, deathVal) => {
  const el = document.getElementById('death-preview'); if(!el) return;
  const age = calcAge(birth, deathVal);
  el.textContent = age && deathVal ? `عمره ${age} سنة` : '';
};

window.saveDeath = async (id, cancel=false) => {
  const m = members.find(x=>x.id==id); if(!m) return;
  const year = cancel ? null : document.getElementById('death-year')?.value || null;
  await saveMember({...m, death: year||null});
  closeDeath();
};

window.closeDeath = () => {
  document.getElementById('death-overlay').classList.remove('show');
  document.getElementById('death-sheet').style.display = 'none';
};

// ── Add / Edit ────────────────────────────────────────────────────────────────
window.openAdd = () => openEdit(null);

window.openEdit = (id) => {
  const m = id ? members.find(x=>x.id==id) : null;
  const others = members.filter(x=>x.id!=id);
  const isEdit = !!m;

  let html = `<div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
  <div class="sheet-header">
    <span class="sheet-title">${isEdit?'تعديل بيانات':'إضافة فرد جديد'}</span>
    <button class="sheet-close" onclick="closeEdit()">إغلاق</button>
  </div>
  <div class="sheet-body">
    <div style="display:flex;justify-content:center">
      <div onclick="document.getElementById('photo-input').click()" style="cursor:pointer;text-align:center">
        <div id="photo-preview-wrap">
          ${m?.photo
            ? `<div class="avatar ${m.gender||'male'}" style="width:80px;height:80px;font-size:32px"><img src="${m.photo}"></div>`
            : `<div class="avatar ${m?.gender||'male'}" style="width:80px;height:80px;font-size:32px">${m?.name?.charAt(0)||'؟'}</div>`
          }
        </div>
        <div style="color:var(--accent);font-size:12px;margin-top:6px">${m?.photo?'تغيير الصورة':'رفع صورة 📷'}</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="previewPhoto(this)">
    </div>

    <div class="field"><label>الاسم الكامل</label><input id="f-name" value="${m?.name||''}" placeholder="مثال: محمد عبدالله"></div>
    <div class="field"><label>صلة القرابة</label><input id="f-rel" value="${m?.relation||''}" placeholder="مثال: جد، أب، عم..."></div>

    <div class="field"><label>الجنس</label>
      <div class="gender-btns">
        <button class="gender-btn male ${!m||m.gender==='male'?'active':''}" onclick="setGender('male',this)">ذكر 👨</button>
        <button class="gender-btn female ${m?.gender==='female'?'active':''}" onclick="setGender('female',this)">أنثى 👩</button>
      </div>
    </div>

    <div class="field-row">
      <div class="field"><label>سنة الميلاد</label><input id="f-birth" type="number" value="${m?.birth||''}" placeholder="1970"></div>
      <div class="field"><label>سنة الوفاة</label><input id="f-death" type="number" value="${m?.death||''}" placeholder="—"></div>
    </div>

    <div class="field"><label>الوالدان (اضغط مطولاً لاختيار أكثر من واحد)</label>
      <select id="f-parents" multiple>
        ${others.map(o=>`<option value="${o.id}" ${m?.parentIds?.includes(o.id)?'selected':''}>${o.name}</option>`).join('')}
      </select>
    </div>

    <div class="field"><label>الزوج / الزوجة</label>
      <select id="f-spouse">
        <option value="">— لا يوجد —</option>
        ${others.map(o=>`<option value="${o.id}" ${m?.spouseId==o.id?'selected':''}>${o.name}</option>`).join('')}
      </select>
    </div>

    <div class="field"><label>نبذة</label><textarea id="f-bio" placeholder="معلومات عن هذا الشخص...">${m?.bio||''}</textarea></div>

    <button class="save-btn" onclick="saveForm('${id||''}')">💾 حفظ</button>
  </div>`;

  document.getElementById('edit-sheet').innerHTML = html;
  document.getElementById('edit-sheet')._memberId = id;
  document.getElementById('edit-sheet')._photo = m?.photo||null;
  document.getElementById('edit-sheet')._gender = m?.gender||'male';
  document.getElementById('edit-overlay').classList.add('show');
  document.getElementById('edit-sheet').style.display = 'block';
};

window.closeEdit = () => {
  document.getElementById('edit-overlay').classList.remove('show');
  document.getElementById('edit-sheet').style.display = 'none';
};

window.setGender = (g, btn) => {
  document.getElementById('edit-sheet')._gender = g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};

window.previewPhoto = (input) => {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    // Compress image using canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById('edit-sheet')._photo = compressed;
      const g = document.getElementById('edit-sheet')._gender||'male';
      document.getElementById('photo-preview-wrap').innerHTML =
        `<div class="avatar ${g}" style="width:80px;height:80px"><img src="${compressed}"></div>`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveForm = async (id) => {
  const name = document.getElementById('f-name').value.trim();
  if(!name){alert('الاسم مطلوب');return;}
  const parentEls = document.getElementById('f-parents');
  const parentIds = Array.from(parentEls.selectedOptions).map(o=>o.value);
  const spouseId = document.getElementById('f-spouse').value||null;
  const member = {
    id: id||String(Date.now()),
    name,
    relation: document.getElementById('f-rel').value,
    gender: document.getElementById('edit-sheet')._gender||'male',
    birth: document.getElementById('f-birth').value||null,
    death: document.getElementById('f-death').value||null,
    bio: document.getElementById('f-bio').value,
    photo: document.getElementById('edit-sheet')._photo||null,
    parentIds,
    spouseId,
  };
  await saveMember(member);
  closeEdit();
};

window.deleteMember = async (id) => {
  if(!confirm('هل تريد حذف هذا الفرد؟')) return;
  await removeMember(id);
  closeProfile();
};
</script>
</body>
</html>
